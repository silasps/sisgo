<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fundo quadrado — iOS/Android aplicam o squircle por cima -->
  <rect width="100" height="100" fill="#1D6B67"/>
  <!-- Círculo em volta do mark -->
  <circle cx="50" cy="50" r="38" stroke="#F5F1E8" stroke-width="1.8" fill="none" opacity="0.4"/>
  <!-- S — arco superior (claro) -->
  <path d="M27 50 Q27 18 50 18 Q73 18 77 36" stroke="#F5F1E8" stroke-width="10" stroke-linecap="round" fill="none"/>
  <!-- S — arco inferior (teal claro) -->
  <path d="M73 50 Q73 82 50 82 Q27 82 23 64" stroke="#A8DFDA" stroke-width="10" stroke-linecap="round" fill="none"/>
  <!-- Ponte central -->
  <line x1="27" y1="50" x2="73" y2="50" stroke="#F5F1E8" stroke-width="4" stroke-linecap="round" opacity="0.35"/>
</svg>
